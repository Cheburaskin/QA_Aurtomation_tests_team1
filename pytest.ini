[pytest]
markers =
    api: API-level tests (use -m api to run only these)
    ui: UI-level tests (use -m ui to run only these)
    mobile: Tests that run on mobile devices (use -m mobile to run only these)
    smoke: Smoke tests that cover basic functionality (use -m smoke to run only these)
    sanity: Sanity tests for quick validation (use -m sanity to run only these)
    regression: Regression tests (use -m regression to run only these)
    errors_handling: Tests that verify error handling and validation (use -m errors_handling to run only these)
    system: System-level tests that cover end-to-end scenarios (use -m system to run only these)
    boundary: Boundary value tests (use -m boundary to run only these)
